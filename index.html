<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warhammer 40K Dice Roller</title>
    <link rel="stylesheet" href="index.css">
    <script src="index.js"></script>
</head>

<body>

    <header>
        Warhammer 40K Dice Rollers
    </header>

    <div class="container" onload="rollDice(1)">
        
        <div class="controls">
            <div class="preset-buttons">
                <button onclick="setDice(1)">1</button>
                <button onclick="setDice(2)">2</button>
                <button onclick="setDice(5)">5</button>
                <button onclick="setDice(10)">10</button>
                <button onclick="setDice(20)">20</button>
            </div>

            <div class="manual-input">
                Number of Dice:
                    <input type="number" id="numDice" value="1">
            </div>

            <button id="rollButton" onclick="rollDice()">Roll</button>
        </div>

        <div class="dice-tray" id="diceTray"></div>

        <div class="results">
            <div class="breakdown">
                <h2>Dice Breakdown</h2>
                <div class="breakdown-grid" id="breakdownGrid"></div>
            </div>

            <div class="summary">
                <h2>Total Summary</h2>
                <div>Total  Dice Rolled: <span id="totalDice">0</span></div>
                <h2>Sum</h2>
                <div class="total-sum" id="totalSum">0</div>
            </div>
        </div>

    </div>

</body>

</html>
