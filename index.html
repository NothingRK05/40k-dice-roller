
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warhammer 40K Dice Roller</title>
    <link rel="stylesheet" href="index.css">
    <script src="index.js" defer></script>
</head>

<body>

    <header>
        Warhammer 40K Dice Roller
    </header>

    <div class="container">

        <div class="controls">
            <div>
                Number of Dice:
                <input type="number" id="numDice" min="1" value="10">
            </div>
            <button id="rollButton">Roll Dice</button>
        </div>

        <div class="dice-tray" id="diceTray">
            Roll the dice to see results
        </div>

        <div class="results">
            <div class="breakdown">
                <h2>Dice Breakdown</h2>
                <div class="breakdown-grid" id="breakdownGrid"></div>
            </div>

            <div class="summary">
                <h2>Total Summary</h2>
                <div>Total Dice Rolled: <span id="totalDice">0</span></div>
                <div class="total-sum" id="totalSum">0</div>
            </div>
        </div>

    </div>

</body>

</html>
